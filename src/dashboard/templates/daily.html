{% extends "layout.html" %}
{% block content %}
<h1>Daily summary</h1>

<div class="card">
  <form method="get">
    <label>Date <input type="date" name="date" value="{{ trading_date }}"></label>
    <button class="btn btn-primary" type="submit">Load</button>
  </form>
</div>

<div class="card md-body">
  {% if markdown %}
    <pre>{{ markdown }}</pre>
  {% else %}
    <p class="muted">No summary file for {{ trading_date }}. It's written on-or-after 16:30 ET for that day.</p>
  {% endif %}
</div>
{% endblock %}
